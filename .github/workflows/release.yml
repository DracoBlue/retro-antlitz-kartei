name: Release

on:
  push:
    branches: [main]

# Cancel an in-flight release if a newer commit lands on main.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # registry-url writes an .npmrc that reads NODE_AUTH_TOKEN, so pnpm
      # publishes authenticated. Use an npm *Automation* token (bypasses 2FA).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      # Opens/updates a "Version Packages" PR when changesets exist, or
      # publishes to npm when that PR has been merged / no changesets remain.
      - uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
