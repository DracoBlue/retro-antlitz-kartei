name: Release

on:
  push:
    branches: [main]

# Cancel an in-flight release if a newer commit lands on main.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC token for npm Trusted Publishing (no NPM_TOKEN needed)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # Node 24 ships npm >= 11.5.1, which OIDC Trusted Publishing requires
      # (Node 22 only has npm 10 — no OIDC). registry-url targets npmjs so the
      # OIDC token exchange happens; no NPM_TOKEN — OIDC overrides the empty
      # auth line setup-node writes.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      # Opens/updates a "Version Packages" PR when changesets exist, or
      # publishes to npm (via OIDC Trusted Publishing) once that PR is merged.
      - uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
