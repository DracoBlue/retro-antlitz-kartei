name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first: animate/react-editor type-check against the generator's
      # emitted .d.ts, so dist must exist before typecheck/test.
      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test
