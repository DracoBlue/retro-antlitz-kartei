<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>retro-antlitz-kartei · generator demo</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #12101a; color: #eee; font-family: system-ui, sans-serif; }
    .card { display: flex; flex-direction: column; gap: 12px; align-items: center; }
    canvas { image-rendering: pixelated; width: 264px; height: 330px;
      border-radius: 8px; box-shadow: 0 12px 40px #0008; }
    .row { display: flex; gap: 8px; }
    input, button { font: inherit; padding: 8px 10px; border-radius: 8px; border: 1px solid #444;
      background: #1d1b27; color: #eee; }
    button { cursor: pointer; }
    code { font-size: 11px; opacity: .6; max-width: 320px; word-break: break-all; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <canvas id="c" width="320" height="400"></canvas>
    <div class="row">
      <input id="seed" placeholder="seed…" value="Ada Lovelace" />
      <button id="gen">Seed</button>
      <button id="rand">🎲 Random</button>
    </div>
    <code id="code"></code>
  </div>

  <script type="importmap">
    { "imports": { "@retro-antlitz-kartei/generator": "../packages/generator/dist/index.js" } }
  </script>
  <script type="module">
    import { renderAvatar, configFromSeed, randomConfig, encodeConfig } from "@retro-antlitz-kartei/generator";
    const canvas = document.getElementById("c");
    const codeEl = document.getElementById("code");
    function show(cfg) { renderAvatar(canvas, cfg); codeEl.textContent = encodeConfig(cfg); }
    document.getElementById("gen").onclick = () => show(configFromSeed(document.getElementById("seed").value || "anon"));
    document.getElementById("rand").onclick = () => show(randomConfig());
    show(configFromSeed("Ada Lovelace"));
  </script>
</body>
</html>
